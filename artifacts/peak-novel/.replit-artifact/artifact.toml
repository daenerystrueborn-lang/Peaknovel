kind = "web"
previewPath = "/"
title = "PeakNovel"
version = "1.0.0"
id = "artifacts/peak-novel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18513

[services.development]
run = "pnpm --filter @workspace/peak-novel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/peak-novel", "run", "build" ]
publicDir = "artifacts/peak-novel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18513"
BASE_PATH = "/"
